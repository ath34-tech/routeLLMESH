version: "3.9"

services:

  routellmesh:

    build: .

    container_name: routellmesh

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:16

    container_name: routellmesh-postgres

    restart: always

    environment:
      POSTGRES_DB: routellmesh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: routellmesh-redis

    restart: always

    ports:
      - "6379:6379"

volumes:

  postgres_data: